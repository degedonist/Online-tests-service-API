services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_pass
      POSTGRES_DB: quiz_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quiz_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://quiz_user:quiz_pass@db:5432/quiz_db
      DATABASE_URL_SYNC: postgresql+psycopg2://quiz_user:quiz_pass@db:5432/quiz_db
      SECRET_KEY: supersecretkeyforjwt1234567890
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz_net
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:

networks:
  quiz_net:
    driver: bridge
